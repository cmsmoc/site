<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presença CMS - Montes Claros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cms-navy:    #0D2E5A;
            --cms-blue:    #1B6CB5;
            --cms-green:   #1E8A4A;
            --cms-yellow:  #F5C400;
            --cms-white:   #FFFFFF;
            --cms-off:     #F7F8FA;
            --cms-ink:     #111827;
            --cms-muted:   #6B7280;
            --cms-border:  #E5E7EB;
            --font-display: 'Montserrat', sans-serif;
            --font-body:    'Open Sans', sans-serif;
            --radius-md: 10px;
        }

        /* ── RESET & MOBILE OPTIMIZATION ── */
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-body); background: var(--cms-off); color: var(--cms-ink); line-height: 1.5; font-size: 16px; overflow-x: hidden; }

        .cms-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* ── LOADING ── */
        .loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--cms-navy); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--cms-white); }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--cms-yellow); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ── HEADER ── */
        .cms-header { background: var(--cms-navy); padding: 40px 0; color: var(--cms-white); border-bottom: 6px solid; border-image: linear-gradient(to right, #F5C400 33%, #1E8A4A 33% 66%, #1B6CB5 66%) 1; }
        .cms-logo { height: 50px; margin-bottom: 24px; display: block; }
        .cms-eyebrow { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--cms-yellow); margin-bottom: 8px; }
        .cms-display { font-family: var(--font-display); font-size: clamp(28px, 8vw, 56px); font-weight: 900; letter-spacing: -1.5px; line-height: 1; text-transform: uppercase; margin-bottom: 16px; }
        .cms-desc { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 300; margin-bottom: 24px; }

        /* ── ACCORDIONS (MOBILE OPTIMIZED) ── */
        .accordion-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        details { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; }
        summary { padding: 14px 20px; font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--cms-yellow); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .details-content { padding: 0 20px 20px; color: rgba(255,255,255,0.8); font-size: 13px; }

        /* ── BTNS ── */
        .cms-btn { display: inline-flex; justify-content: center; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 16px 20px; border-radius: 6px; border: none; cursor: pointer; text-decoration: none; width: 100%; }
        .cms-btn-primary { background: var(--cms-yellow); color: var(--cms-navy); }
        .cms-btn-secondary { background: var(--cms-blue); color: var(--cms-white); }
        
        /* ── STATS ── */
        .cms-grid-stat { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 24px 0; }
        .cms-stat { background: var(--cms-white); border: 1px solid var(--cms-border); border-radius: 8px; text-align: center; padding: 16px 8px; }
        .cms-stat-number { font-family: var(--font-display); font-size: 28px; font-weight: 900; line-height: 1; color: var(--cms-navy); }
        .cms-stat-label { font-size: 8px; font-weight: 700; color: var(--cms-muted); text-transform: uppercase; margin-top: 4px; font-family: var(--font-display); }

        /* ── CARDS & LOGIC ── */
        .cms-grid-3 { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 24px; }
        @media(min-width: 768px) { .cms-grid-3 { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }
        
        .cms-card { background: var(--cms-white); border: 1px solid var(--cms-border); border-radius: var(--radius-md); padding: 20px; display: flex; align-items: flex-start; gap: 12px; position: relative; overflow: hidden; transition: all 0.2s; }
        
        /* PENDENTES: Apagados */
        .cms-card-pending { opacity: 0.45; filter: grayscale(100%); }
        .cms-card:active { transform: scale(0.98); }
        
        .card-segment-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4px; }
        .avatar-box { flex-shrink: 0; }
        .cms-card-name { font-family: var(--font-display); font-size: 15px; font-weight: 900; text-transform: uppercase; color: var(--cms-navy); line-height: 1.1; margin: 4px 0; }
        .cms-card-entity { font-size: 11px; color: var(--cms-muted); line-height: 1.3; }
        .cms-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-family: var(--font-display); font-size: 8px; font-weight: 700; text-transform: uppercase; }
        .tag-titular { background: var(--cms-off); color: var(--cms-ink); border: 1px solid var(--cms-border); }
        .tag-suplente { background: rgba(245, 196, 0, 0.1); color: #854d0e; border: 1px solid var(--cms-yellow); }

        /* ── FORM ── */
        .public-box { background: var(--cms-white); border: 1px solid var(--cms-border); border-radius: var(--radius-md); padding: 24px; border-top: 4px solid var(--cms-blue); margin-bottom: 24px; }
        input, textarea, select { width: 100%; padding: 14px; border: 2px solid var(--cms-border); border-radius: 6px; font-size: 16px; margin-bottom: 12px; background: var(--cms-off); font-family: inherit; }

        /* ── MODAIS ── */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 46, 90, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;}
        .modal { background: var(--cms-white); padding: 30px; border-radius: var(--radius-md); width: 100%; max-width: 400px; }
        
        .success-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; color: var(--cms-white); padding: 20px; }
        .success-screen h1 { font-family: var(--font-display); font-size: 32px; font-weight: 900; margin-top: 16px; text-transform: uppercase; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader" class="loader-screen">
        <div class="spinner"></div>
        <div class="loader-text" style="animation: pulse 2s infinite">Sincronizando...</div>
    </div>

    <div id="app" class="hidden">
        <header class="cms-header">
            <div class="cms-wrap">
                <img src="https://cmsmoc.github.io/secretariaexecutiva/logo/logohwh.png" alt="CMS" class="cms-logo">
                <p class="cms-eyebrow" id="headerLabel">Carregando...</p>
                <h1 class="cms-display" id="headerTitle">Reunião</h1>
                <p class="cms-desc" id="headerDesc"></p>

                <div class="accordion-grid">
                    <details>
                        <summary>Pautas da Reunião</summary>
                        <div class="details-content" id="headerPauta"></div>
                    </details>
                    <details>
                        <summary>Local e Data</summary>
                        <div class="details-content" id="headerQuandoOnde"></div>
                    </details>
                </div>

                <a href="#secPublico" class="cms-btn cms-btn-primary">
                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path></svg>
                    Visitantes: Registrar Presença
                </a>
            </div>
        </header>

        <main class="cms-wrap">
            <div class="cms-grid-stat">
                <div class="cms-stat"><div class="cms-stat-number" id="statPresentes" style="color: var(--cms-green);">0</div><div class="cms-stat-label">Presentes</div></div>
                <div class="cms-stat"><div class="cms-stat-number" id="statAusentes">0</div><div class="cms-stat-label">Justificativas</div></div>
                <div class="cms-stat"><div class="cms-stat-number" id="statPublico" style="color: var(--cms-blue);">0</div><div class="cms-stat-label">Público</div></div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cms-border); padding-bottom: 12px; margin-top: 32px;">
                <h2 style="font-family: var(--font-display); font-weight: 900; font-size: 16px; color: var(--cms-navy); text-transform: uppercase;">Conselheiros</h2>
                <select id="filterStatus" onchange="applyFilter()" style="width: auto; margin-bottom: 0; padding: 6px 12px; font-size: 12px;">
                    <option value="ALL">Todos</option>
                    <option value="PENDING">Pendentes</option>
                    <option value="PRESENT">Presentes</option>
                    <option value="ABSENT">Ausentes</option>
                </select>
            </div>

            <div id="gridConselheiros" class="cms-grid-3"></div>

            <section id="secPublico" style="margin-top: 60px;">
                <h2 style="font-family: var(--font-display); font-weight: 900; font-size: 16px; color: var(--cms-navy); text-transform: uppercase; margin-bottom: 20px;">Público Externo</h2>
                <div id="formPublicoWrapper" class="public-box">
                    <form id="formPublico">
                        <input type="text" id="pubNome" placeholder="Nome Completo *" required>
                        <input type="email" id="pubEmail" placeholder="E-mail *" required>
                        <input type="text" id="pubCargo" placeholder="Cargo / Entidade">
                        <button type="submit" class="cms-btn cms-btn-secondary" id="btnSubmitPub">Confirmar Presença</button>
                    </form>
                </div>
                <div id="gridPublico" class="cms-grid-3" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
            </section>
        </main>
    </div>

    <div id="modalAcao" class="modal-overlay">
        <div class="modal">
            <p class="cms-tag tag-titular" id="modalCadeira" style="margin-bottom: 12px;">TITULAR</p>
            <div style="font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--cms-navy); text-transform: uppercase; line-height: 1.1;" id="modalNome">NOME</div>
            <div style="color: var(--cms-muted); margin-bottom: 24px; font-size: 13px; margin-top: 6px;" id="modalEntidade">Entidade</div>
            <div id="stepAcao">
                <button class="cms-btn cms-btn-primary" style="margin-bottom:12px;" onclick="showConfirmPresence()">Registrar Presença</button>
                <button class="cms-btn" style="background:#DC2626; color:white; margin-bottom:12px;" onclick="showJustifyAbsence()">Justificar Ausência</button>
                <button class="cms-btn" style="background:transparent; border:1px solid var(--cms-border); color:var(--cms-ink);" onclick="closeModal()">Cancelar</button>
            </div>
            <div id="stepConfirmaPresenca" class="hidden">
                <p style="font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--cms-navy); margin-bottom: 20px;">CONFIRMAR PRESENÇA OFICIAL?</p>
                <div style="display: flex; gap: 10px;">
                    <button class="cms-btn cms-btn-primary" onclick="submitAction('PRESENÇA')">SIM</button>
                    <button class="cms-btn" style="background:transparent; border:1px solid var(--cms-border);" onclick="closeModal()">NÃO</button>
                </div>
            </div>
            <div id="stepJustificaAusencia" class="hidden">
                <textarea id="textoJustificativa" rows="3" placeholder="Motivo da ausência..."></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="cms-btn" style="background:#DC2626; color:white;" onclick="submitAction('AUSÊNCIA')">SALVAR</button>
                    <button class="cms-btn" style="background:transparent; border:1px solid var(--cms-border);" onclick="closeModal()">VOLTAR</button>
                </div>
            </div>
            <div id="modalLoading" class="hidden" style="text-align: center; margin-top: 15px; font-size: 12px; font-weight: 700; color: var(--cms-blue);">PROCESSANDO...</div>
        </div>
    </div>

    <div id="successScreen" class="success-screen">
        <svg width="80" height="80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h1 id="successMsg">CONFIRMADO</h1>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwwzDRStWcLJ9MbztmPozlyGiLPZKC46yKsVd888XDusRa2heJkuSk2Tc5W5TMhj2UAfA/exec";
        const TOKEN = "CMS_MOC_SECURE_TOKEN_2026";
        let appData = {};
        let selectedConselheiro = null;

        function formatFirstTwoNames(n) { const p = n.trim().split(" "); return p.length === 1 ? p[0] : `${p[0]} ${p[1]}`; }
        function formatPublicName(n) { const p = n.trim().split(" "); if (p.length <= 2) return n; let f = `${p[0]} ${p[1]}`; for (let i = 2; i < p.length; i++) { if (p[i].length > 2) f += ` ${p[i][0]}.`; } return f; }
        function getSegmentColor(s) { const g = s.toUpperCase(); if (g.includes("GESTOR")) return "var(--cms-blue)"; if (g.includes("TRABALHADOR")) return "var(--cms-green)"; return "var(--cms-navy)"; }

        function getAvatarSVG(n, s) {
            const isF = /[aey]$/i.test(n.split(" ")[0]); const c = getSegmentColor(s);
            return `<svg viewBox="0 0 100 100" width="40" height="40" style="background: ${c}15; border-radius: 50%;">
                <circle cx="50" cy="${isF?40:36}" r="16" fill="${c}" />
                <path d="M${isF?25:20} 100 C ${isF?25:20} ${isF?70:65}, ${isF?75:80} ${isF?70:65}, ${isF?75:80} 100" fill="${c}" />
                ${isF?`<path d="M34 40 Q 50 15 66 40 Q 75 60 65 75 Q 50 65 35 75 Q 25 60 34 40 Z" fill="${c}" opacity="0.2"/>`:''}
            </svg>`;
        }

        async function init() {
            try {
                const r = await fetch(API_URL); appData = await r.json();
                appData.conselheiros.sort((a, b) => a.nome.localeCompare(b.nome));
                renderApp();
            } catch (e) { console.error(e); }
        }

        function renderApp() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('headerLabel').innerText = appData.configs.LABEL_TOPO || "CMS Montes Claros";
            document.getElementById('headerTitle').innerText = appData.configs.TITULO || "Reunião";
            document.getElementById('headerDesc').innerText = appData.configs.DESCRICAO || "";
            if(appData.configs.PAUTA) document.getElementById('headerPauta').innerHTML = appData.configs.PAUTA;
            if(appData.configs.QUANDO_ONDE) document.getElementById('headerQuandoOnde').innerHTML = appData.configs.QUANDO_ONDE;
            calculateStats(); applyFilter(); renderPublico(appData.configs.MODO);
        }

        function calculateStats() {
            let pres = 0, aus = 0, pub = 0;
            appData.lista.forEach(i => {
                if(i.id && i.id !== "-") { (i.registro === "PRESENÇA") ? pres++ : aus++; } else { pub++; }
            });
            document.getElementById('statPresentes').innerText = pres;
            document.getElementById('statAusentes').innerText = aus;
            document.getElementById('statPublico').innerText = pub;
        }

        function applyFilter() { renderConselheiros(appData.configs.MODO, appData.configs.STATUS_SISTEMA === "ATIVO", document.getElementById('filterStatus').value); }

        function renderConselheiros(modo, isAtivo, filter) {
            const grid = document.getElementById('gridConselheiros'); grid.innerHTML = '';
            appData.conselheiros.forEach(c => {
                const reg = appData.lista.find(l => l.id === c.id);
                if (filter === 'PRESENT' && (!reg || reg.registro !== "PRESENÇA")) return;
                if (filter === 'ABSENT' && (!reg || reg.registro !== "AUSÊNCIA")) return;
                if (filter === 'PENDING' && reg) return;
                if (modo == 2 && (!reg || reg.registro !== "PRESENÇA")) return;

                const card = document.createElement('div');
                card.className = 'cms-card';
                
                // LÓGICA DE CALOR: Pendentes ficam apagados
                if (modo == 1 && !reg) card.classList.add('cms-card-pending');
                if (!isAtivo && modo == 1) card.classList.add('disabled');
                
                const col = getSegmentColor(c.segmento);
                card.innerHTML = `<div class="card-segment-bar" style="background:${col}"></div>
                    <div class="avatar-box">${getAvatarSVG(c.nome, c.segmento)}</div>
                    <div class="card-info">
                        <span class="cms-tag ${c.cadeira.toUpperCase()==='TITULAR'?'tag-titular':'tag-suplente'}">${c.cadeira}</span>
                        <div class="cms-card-name">${formatFirstTwoNames(c.nome)}</div>
                        <div class="cms-card-entity">${c.entidade}</div>
                        ${(modo==1 && reg)?`<div class="status-badge" style="color:${reg.registro==='PRESENÇA'?'var(--cms-green)':'#DC2626'}">● ${reg.registro}</div>`:''}
                        ${(modo==2 && reg && reg.link_declaracao)?`<div style="margin-top:10px; font-size:9px; font-weight:800; color:var(--cms-blue);">📥 DECLARAÇÃO DISPONÍVEL</div>`:''}
                    </div>`;
                if (modo == 1 && isAtivo) card.onclick = () => openModal(c);
                else if (modo == 2 && reg && reg.link_declaracao) card.onclick = () => window.open(reg.link_declaracao, '_blank');
                grid.appendChild(card);
            });
        }

        function renderPublico(m) {
            const g = document.getElementById('gridPublico'); g.innerHTML = '';
            if (m == 2 || appData.configs.STATUS_SISTEMA !== "ATIVO") document.getElementById('formPublicoWrapper').style.display='none';
            appData.lista.filter(l => l.id === "-" || !l.id).forEach(p => {
                const d = document.createElement('div'); d.style.padding="12px"; d.style.background="var(--cms-white)"; d.style.border="1px solid var(--cms-border)"; d.style.borderRadius="6px"; d.style.fontSize="12px";
                d.innerHTML = `<strong style="display:block; font-size:12px; text-transform:uppercase; color:var(--cms-navy);">${formatPublicName(p.nome)}</strong><span style="color:var(--cms-muted); font-size:10px;">${p.cargo_setor!=="-"?p.cargo_setor:"Visitante"}</span>`;
                g.appendChild(d);
            });
        }

        function openModal(c) {
            selectedConselheiro = c; document.getElementById('modalNome').innerText = c.nome; document.getElementById('modalEntidade').innerText = c.entidade; document.getElementById('modalCadeira').innerText = c.cadeira;
            document.getElementById('stepAcao').classList.remove('hidden'); document.getElementById('stepConfirmaPresenca').classList.add('hidden'); document.getElementById('stepJustificaAusencia').classList.add('hidden'); document.getElementById('modalLoading').classList.add('hidden');
            document.getElementById('modalAcao').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modalAcao').style.display='none'; }
        function showConfirmPresence() { document.getElementById('stepAcao').classList.add('hidden'); document.getElementById('stepConfirmaPresenca').classList.remove('hidden'); }
        function showJustifyAbsence() { document.getElementById('stepAcao').classList.add('hidden'); document.getElementById('stepJustificaAusencia').classList.remove('hidden'); }

        async function submitAction(t) {
            const p = { token: TOKEN, tipo_usuario: "CONSELHEIRO", cargo_setor: selectedConselheiro.cadeira, nome: selectedConselheiro.nome, id: selectedConselheiro.id, registro: t, justificativa: t==='AUSÊNCIA'?document.getElementById('textoJustificativa').value:"", email: "" };
            await sendPostRequest(p, (t==='AUSÊNCIA'?"AUSÊNCIA JUSTIFICADA":`${formatFirstTwoNames(selectedConselheiro.nome)}<br>PRESENÇA SALVA`));
        }

        document.getElementById('formPublico').addEventListener('submit', async (e) => {
            e.preventDefault(); const b = document.getElementById('btnSubmitPub'); b.disabled = true;
            const p = { token: TOKEN, tipo_usuario: "PÚBLICO", cargo_setor: document.getElementById('pubCargo').value, nome: document.getElementById('pubNome').value, id: "-", registro: "PRESENÇA", justificativa: "", email: document.getElementById('pubEmail').value };
            await sendPostRequest(p, `${formatPublicName(p.nome)}<br>PRESENÇA SALVA`);
            b.disabled = false; document.getElementById('formPublico').reset();
        });

        async function sendPostRequest(p, msg) {
            document.getElementById('stepConfirmaPresenca').classList.add('hidden'); document.getElementById('stepJustificaAusencia').classList.add('hidden'); document.getElementById('modalLoading').classList.remove('hidden');
            try {
                const r = await fetch(API_URL, { method:'POST', body: JSON.stringify(p) }); const d = await r.json();
                if (d.status === "sucesso") {
                    closeModal(); showBigSuccess(msg, p.registro === 'AUSÊNCIA');
                    const r2 = await fetch(API_URL); appData = await r2.json(); appData.conselheiros.sort((a, b) => a.nome.localeCompare(b.nome)); renderApp();
                } else { alert(d.mensagem); closeModal(); }
            } catch (e) { alert("Erro na conexão."); closeModal(); }
        }

        function showBigSuccess(m, a) {
            const s = document.getElementById('successScreen'); document.getElementById('successMsg').innerHTML = m;
            s.style.backgroundColor = a ? "#DC2626" : "var(--cms-green)"; s.style.display = "flex";
            setTimeout(() => { s.style.display = "none"; }, 2500);
        }

        init();
    </script>
</body>
</html>
