<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeria de Assinaturas de Ofícios - CMS Montes Claros</title>
    
    <!-- Meta tags SEO / Social -->
    <meta property="og:title" content="Assinatura de Ofícios - CMS 2026">
    <meta property="og:description" content="Acesse a galeria para assinar os ofícios via portal GOV.BR">
    <meta property="og:image" content="https://www.cmsmoc.com/assinaroficios/thumb.webp">
    <meta property="og:url" content="https://www.cmsmoc.com/assinaroficios">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cms-navy: #0D2E5A;
            --cms-blue: #1B6CB5;
            --cms-blue-light: #E0E7FF;
            --cms-green: #1E8A4A;
            --cms-green-light: #D1FAE5;
            --cms-yellow: #F5C400;
            --cms-orange: #EA580C;
            --cms-orange-light: #FFEDD5;
            --cms-off: #F8FAFC;
            --cms-ink: #0F172A;
            --cms-muted: #64748B;
            --cms-border: #E2E8F0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--cms-off);
            color: var(--cms-ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top brand stripe */
        .brand-stripe {
            height: 6px;
            background: linear-gradient(90deg, var(--cms-yellow) 33.3%, var(--cms-green) 33.3% 66.6%, var(--cms-blue) 66.6%);
            width: 100%;
        }

        /* Header design */
        header {
            background-color: #ffffff;
            border-bottom: 1px solid var(--cms-border);
            padding: 24px 20px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05);
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            text-align: center;
        }

        @media(min-width: 768px) {
            .header-container {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
        }

        .logo-and-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-and-title h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--cms-navy);
            letter-spacing: -0.5px;
        }

        .logo-and-title p {
            font-size: 14px;
            color: var(--cms-muted);
            font-weight: 400;
        }

        .badge-portal {
            background-color: var(--cms-blue-light);
            color: var(--cms-blue);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(27, 108, 181, 0.15);
        }

        main {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 20px 60px 20px;
            width: 100%;
            flex-grow: 1;
        }

        /* KPI / Summary Section */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: #ffffff;
            border: 1px solid var(--cms-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .kpi-card.kpi-total::before { background-color: var(--cms-blue); }
        .kpi-card.kpi-signed::before { background-color: var(--cms-green); }
        .kpi-card.kpi-pending::before { background-color: var(--cms-orange); }
        .kpi-card.kpi-info::before { background-color: var(--cms-muted); }

        .kpi-label {
            font-size: 13px;
            color: var(--cms-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--cms-navy);
            line-height: 1;
        }

        /* Filter Controls */
        .controls-panel {
            background-color: #ffffff;
            border: 1px solid var(--cms-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media(min-width: 992px) {
            .controls-panel {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        .search-box-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 500px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid var(--cms-border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            color: var(--cms-ink);
            transition: all 0.2s ease;
            background-color: var(--cms-off);
        }

        .search-input:focus {
            border-color: var(--cms-blue);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(27, 108, 181, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cms-muted);
            pointer-events: none;
        }

        .filter-buttons-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            background-color: #ffffff;
            border: 1px solid var(--cms-border);
            color: var(--cms-muted);
            padding: 10px 18px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .filter-btn:hover {
            border-color: var(--cms-blue);
            color: var(--cms-blue);
            background-color: var(--cms-off);
        }

        .filter-btn.active {
            background-color: var(--cms-navy);
            border-color: var(--cms-navy);
            color: #ffffff;
        }

        /* Cards Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            transition: opacity 0.25s ease;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--cms-border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            min-height: 290px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--cms-blue);
        }

        .card-header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .oficio-num {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--cms-navy);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .origin-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .origin-badge.cism {
            background-color: rgba(245, 196, 0, 0.15);
            color: #856404;
            border: 1px solid rgba(245, 196, 0, 0.25);
        }

        .origin-badge.ctigfin {
            background-color: rgba(27, 108, 181, 0.1);
            color: var(--cms-blue);
            border: 1px solid rgba(27, 108, 181, 0.15);
        }

        .card-title-ent {
            font-size: 16px;
            font-weight: 700;
            color: var(--cms-navy);
            margin-bottom: 6px;
            line-height: 1.35;
            min-height: 44px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-resp {
            font-size: 13.5px;
            color: var(--cms-ink);
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-resp span {
            color: var(--cms-muted);
            font-weight: 400;
        }

        .card-subject-box {
            font-size: 11.5px;
            color: var(--cms-muted);
            background-color: var(--cms-off);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--cms-border);
            line-height: 1.45;
            margin-bottom: 20px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-action-area {
            margin-top: auto;
        }

        /* Custom Status badge in Cards */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .status-pill.pendente {
            background-color: var(--cms-orange-light);
            color: var(--cms-orange);
        }

        .status-pill.assinado {
            background-color: var(--cms-green-light);
            color: var(--cms-green);
        }

        .status-pill.substituido {
            background-color: #F1F5F9;
            color: #475569;
            border: 1px dashed #CBD5E1;
        }

        /* Action Buttons */
        .btn-action {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 13px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-action.btn-assinar {
            background-color: var(--cms-green);
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(30, 138, 74, 0.2);
        }

        .btn-action.btn-assinar:hover {
            background-color: #166534;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(30, 138, 74, 0.3);
        }

        .btn-action.btn-baixar-assinado {
            background-color: var(--cms-navy);
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(13, 46, 90, 0.2);
        }

        .btn-action.btn-baixar-assinado:hover {
            background-color: #081e3d;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(13, 46, 90, 0.3);
        }

        .btn-action.btn-info-only {
            background-color: #E2E8F0;
            color: #475569;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            background-color: #ffffff;
            border: 1px dashed var(--cms-border);
            border-radius: 16px;
            color: var(--cms-muted);
            font-size: 16px;
        }

        footer {
            background-color: #ffffff;
            border-top: 1px solid var(--cms-border);
            padding: 24px 20px;
            text-align: center;
            font-size: 13px;
            color: var(--cms-muted);
        }
    </style>
</head>

        </section>

        <!-- Controls Filter Panel -->
        <section class="controls-panel">
            <div class="search-box-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Pesquisar por entidade, nº de ofício ou responsável...">
            </div>
            <div class="filter-buttons-wrapper">
                <button class="filter-btn active" data-filter="todos">Todos os Ofícios</button>
                <button class="filter-btn" data-filter="pendente">Aguardando Assinatura</button>
                <button class="filter-btn" data-filter="assinado">Já Assinados</button>
                <button class="filter-btn" data-filter="substituido">Substituídos</button>
            </div>
        </section>

        <!-- Grid Cards oficios -->
        <section class="grid-container" id="grid">
            <!-- Dynamic cards will be rendered here -->
        </section>
    </main>

    <footer>
        <p>© 2026 Conselho Municipal de Saúde de Montes Claros/MG | Secretaria Executiva</p>
    </footer>

            { filename: "Oficio_062_UNIFIPMocAfya.pdf", numStr: "062", ent: "UNIFIPMoc Afya", resp: "Renata Flávia Nobre Canela Dias", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "assinado", signedFilename: "Oficio_062_UNIFIPMocAfya assinado.pdf", orig: "CTIgFin" },
            { filename: "Oficio_063_Funorte.pdf", numStr: "063", ent: "Funorte", resp: "Suely dos Reis Nobre", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "assinado", signedFilename: "Oficio_063_Funorte assinado.pdf", orig: "CTIgFin" },
            { filename: "Oficio_064_FaculdadedeCinciasOdontolgicasFCO.pdf", numStr: "064", ent: "Faculdade de Ciências Odontológicas (FCO)", resp: "Renann Murilo Oliveira Costa", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "assinado", signedFilename: "Oficio_064_FaculdadedeCinciasOdontolgicasFCO assinado.pdf", orig: "CTIgFin" },
            { filename: "Oficio_065_ComponenteMunicipaldeAuditoria.pdf", numStr: "065", ent: "Componente Municipal de Auditoria", resp: "A/C Coordenador(a)", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "assinado", signedFilename: "Oficio_065_ComponenteMunicipaldeAuditoria assinado.pdf", orig: "CTIgFin" },
            
            // CTIgFin (066 a 071) - PENDENTES
            { filename: "Oficio_066_ConselhoRegionaldeAdministraodeMinasGeraisCRAMG.pdf", numStr: "066", ent: "Conselho Regional de Administração de Minas Gerais (CRA-MG)", resp: "A/C Adm. Jehu de Aguilar", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "pendente", orig: "CTIgFin" },
            { filename: "Oficio_067_ConselhoRegionaldeContabilidadeCRC.pdf", numStr: "067", ent: "Conselho Regional de Contabilidade (CRC)", resp: "A/C Maria da Conceição Barros de Rezende Ladeira", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "pendente", orig: "CTIgFin" },
            { filename: "Oficio_068_OrdemdosAdvogadosdoBrasilOAB11Subseo.pdf", numStr: "068", ent: "Ordem dos Advogados do Brasil (OAB - 11ª Subseção)", resp: "Herbert Alcântara", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "pendente", orig: "CTIgFin" },
            { filename: "Oficio_069_SecretariaMunicipaldeSadeSMS.pdf", numStr: "069", ent: "Secretaria Municipal de Saúde (SMS)", resp: "Eduardo Luiz da Silva", subject: "Assunto: Convite para participação na Câmara Técnica de Instrumentos de Gestão, Finanças, Contabilidade e Auditoria (CTIGFIN)", status: "pendente", orig: "CTIgFin" },
            { filename: "Oficio_070_SecretariaMunicipaldeSadeSMS.pdf", numStr: "070", ent: "Secretaria Municipal de Saúde (SMS)", resp: "Eduardo Luiz da Silva", subject: "Assunto: Solicitação de informações sobre o fluxo administrativo de contratos e convênios", status: "pendente", orig: "CTIgFin" },
            { filename: "Oficio_071_SecretariaMunicipaldeSadeSMS.pdf", numStr: "071", ent: "Secretaria Municipal de Saúde (SMS)", resp: "Eduardo Luiz da Silva", subject: "Assunto: Solicitação de cópia integral dos contratos hospitalares vigentes", status: "pendente", orig: "CTIgFin" }
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('search-input');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Metricas
        const totalVal = document.getElementById('kpi-total-val');
        const signedVal = document.getElementById('kpi-signed-val');
        const pendingVal = document.getElementById('kpi-pending-val');

        let currentFilter = 'todos';
        let searchQuery = '';

        function updateKPIs() {
            totalVal.textContent = oficios.length;
            signedVal.textContent = oficios.filter(o => o.status === 'assinado').length;
            pendingVal.textContent = oficios.filter(o => o.status === 'pendente').length;
        }

        function render() {
            grid.innerHTML = '';
            
            const filtered = oficios.filter(item => {
                // Match search
                const query = searchQuery.toLowerCase();
                const matchesSearch = 
                    item.numStr.includes(query) ||
                    item.ent.toLowerCase().includes(query) ||
                    item.resp.toLowerCase().includes(query) ||
                    item.subject.toLowerCase().includes(query);

                // Match filter
                const matchesFilter = currentFilter === 'todos' || item.status === currentFilter;
                
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state">Nenhum ofício encontrado correspondente aos critérios de busca.</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${item.status}`;
                
                let statusHtml = '';
                let actionHtml = '';

                if (item.status === 'pendente') {
                    statusHtml = `<span class="status-pill pendente">⏳ Aguardando Assinatura</span>`;
                    actionHtml = `<button class="btn-action btn-assinar" onclick="assinar('${item.filename}')">✍️ Assinar no Gov.br</button>`;
                } else if (item.status === 'assinado') {
                    statusHtml = `<span class="status-pill assinado">✓ Já Assinado</span>`;
                    actionHtml = `<a class="btn-action btn-baixar-assinado" href="oficios-pdf/${item.signedFilename}" download="${item.signedFilename}">📥 Baixar Assinado</a>`;
                } else if (item.status === 'substituido') {
                    statusHtml = `<span class="status-pill substituido">📁 Feito no Ofício 41</span>`;
                    actionHtml = `<button class="btn-action btn-info-only" disabled>Enviado como Ofício 041</button>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="card-header-meta">
                            <span class="oficio-num">Ofício nº ${item.numStr}/2026</span>
                            <span class="origin-badge ${item.orig.toLowerCase()}">${item.orig}</span>
                        </div>
                        <h2 class="card-title-ent">${item.ent}</h2>
                        <div class="card-resp"><span>A/C:</span> ${item.resp}</div>
                        <div class="card-subject-box">${item.subject.replace('Assunto: ', '')}</div>
                    </div>
                    <div class="card-action-area">
                        ${statusHtml}
                        ${actionHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function assinar(filename) {
            // Open ITI Gov Signer
            window.open('https://assinador.iti.br/', '_blank');

            // Trigger download to the local user machine
            fetch('oficios-pdf/' + filename)
                .then(response => {
                    if (!response.ok) throw new Error('Não foi possível baixar o PDF');
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                })
                .catch(err => {
                    console.error('Erro ao baixar o PDF:', err);
                    alert('Erro ao baixar o arquivo para assinatura: ' + err.message);
                });
        }

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                render();
            });
        });

        // Init
        updateKPIs();
        render();
    </script>
</body>
</html>
