<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <!-- Update metadata -->
    <meta property="og:title" content="Assinatura de Ofícios - CMS 2026">
    <meta property="og:description" content="Acesse a galeria para assinar os ofícios via portal GOV.BR">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cms-navy: #0D2E5A;
            --cms-blue: #1B6CB5;
            --cms-green: #1E8A4A;
            --cms-yellow: #F5C400;
            --cms-off: #F7F8FA;
            --cms-ink: #111827;
            --cms-border: #E5E7EB;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--cms-off);
            color: var(--cms-ink);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .stripe {
            height: 6px;
            background: linear-gradient(90deg, var(--cms-yellow) 33.3%, var(--cms-green) 33.3% 66.6%, var(--cms-blue) 66.6%);
            width: 100%;
        }
        header {
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: var(--cms-navy);
            margin: 0;
        }
        main {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
        }
        .intro {
            text-align: center;
            margin-bottom: 40px;
            color: #4b5563;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--cms-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .card-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--cms-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--cms-navy);
            margin: 0 0 8px 0;
            line-height: 1.3;
        }
        .card.disabled {
            opacity: 0.6;
            filter: grayscale(80%);
        }
        .card-recipient {
            font-size: 13px;
            color: #4b5563;
            margin: 0 0 6px 0;
            font-weight: 600;
        }
        .card-subject {
            font-size: 11px;
            color: #6b7280;
            margin: 0 0 16px 0;
            background: #f9fafb;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #f3f4f6;
            line-height: 1.4;
        }
        .btn-assinar {
            background-color: var(--cms-green);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-assinar:hover:not(:disabled) {
            background-color: #156d3a;
        }
        .btn-assinar:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
    <script>
        function assinar(filename) {
            // Open Gov Assinador in a new tab immediately
            window.open('https://assinador.iti.br/', '_blank');

            // Force download via fetch to bypass browser PDF viewer
            fetch('oficios-pdf/' + filename)
                .then(response => response.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                })
                .catch(err => console.error('Erro ao baixar o PDF:', err));
        }
    </script>
</head>
