<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventário de Apresentações — CMS Montes Claros</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,700,1,0" rel="stylesheet" />
<style>
/* ════════════════════════════════════════════════════
   CMS MONTES CLAROS · INVENTÁRIO (GALERIA COM CATEGORIAS)
════════════════════════════════════════════════════ */

:root {
  --cms-navy:   #0D2E5A;
  --cms-blue:   #1B6CB5;
  --cms-green:  #1E8A4A;
  --cms-yellow: #F5C400;
  --cms-white:  #FFFFFF;
  --cms-off:    #F7F8FA;
  --cms-ink:    #111827;
  --cms-muted:  #6B7280;
  --cms-border: #E5E7EB;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Open Sans', sans-serif;
  background: var(--cms-off);
  color: var(--cms-ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  background: var(--cms-navy);
  color: var(--cms-white);
  padding: 48px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.tri-stripe {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(to right, var(--cms-yellow) 33%, var(--cms-green) 33% 66%, var(--cms-blue) 66%);
}
header h1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(28px, 4vw, 48px);
  letter-spacing: -1px;
  margin-bottom: 8px;
}
header p {
  color: rgba(255,255,255,0.7);
  font-size: 16px;
  max-width: 600px;
  margin: 0 auto;
}

/* ── MAIN & FILTROS ── */
main {
  flex: 1;
  padding: 48px 24px 64px;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
}

.filters-container {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 40px;
  justify-content: center;
}
.filter-btn {
  background: var(--cms-white);
  border: 1px solid var(--cms-border);
  color: var(--cms-muted);
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.filter-btn:hover {
  border-color: var(--cms-blue);
  color: var(--cms-blue);
}
.filter-btn.active {
  background: var(--cms-navy);
  border-color: var(--cms-navy);
  color: var(--cms-white);
}

/* ── GALERIA (GRID) ── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 40px;
}

/* ── CARDS DE APRESENTAÇÃO ── */
.card {
  background: var(--cms-white);
  border-radius: 8px;
  border: 1px solid var(--cms-border);
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  position: relative;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.1);
  border-color: var(--cms-blue);
}

/* Badge / Etiqueta de Categoria */
.card-badge {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 20;
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Thumbnail com iframe escalonado */
.thumb-container {
  width: 100%;
  aspect-ratio: 16 / 9;
  position: relative;
  overflow: hidden;
  background: var(--cms-navy);
  border-bottom: 3px solid var(--cms-border); /* Cor alterada via JS */
}
.thumb-iframe {
  width: 400%;  
  height: 400%;
  transform: scale(0.25); 
  transform-origin: top left;
  border: none;
  pointer-events: none; 
  position: absolute;
  top: 0; left: 0;
}

.card-content {
  padding: 24px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.card-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--cms-navy);
  margin-bottom: 12px;
  line-height: 1.4;
}
.card-meta {
  font-size: 12px;
  color: var(--cms-muted);
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── MODAL (POPUP) ── */
#presentation-modal {
  position: fixed;
  inset: 0;
  background: rgba(17, 24, 39, 0.95);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#presentation-modal.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-header {
  height: 56px;
  background: var(--cms-navy);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  border-bottom: 2px solid var(--cms-yellow);
}
.modal-title {
  color: var(--cms-white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.modal-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.btn-close {
  background: transparent;
  border: none;
  color: var(--cms-white);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 12px;
  transition: color 0.2s;
}
.btn-close:hover {
  color: var(--cms-yellow);
}

.modal-body {
  flex: 1;
  position: relative;
  background: var(--cms-ink);
}
.modal-body iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ── LOADER / STATUS ── */
#status-message {
  text-align: center;
  padding: 40px;
  color: var(--cms-muted);
  font-weight: 600;
  grid-column: 1 / -1;
}
.material-symbols-rounded {
  font-family: 'Material Symbols Rounded', sans-serif !important;
  vertical-align: middle;
}
</style>
</head>
<body>

<header>
  <div class="tri-stripe"></div>
  <span class="material-symbols-rounded" style="font-size: 48px; color: var(--cms-yellow); margin-bottom: 16px;">library_books</span>
  <h1>Apresentações Institucionais</h1>
  <p>Inventário de arquivos interativos e apresentações do Conselho Municipal de Saúde de Montes Claros</p>
</header>

<main>
  <!-- Contêiner de Filtros -->
  <div class="filters-container" id="filters-container">
    <!-- Botões gerados via JS -->
  </div>

  <div class="gallery-grid" id="gallery">
    <div id="status-message">Procurando apresentações e pastas...</div>
  </div>
</main>

<!-- Modal Fullscreen -->
<div id="presentation-modal">
  <div class="modal-header">
    <div class="modal-title">
      <span id="modal-badge-container"></span>
      <span id="modal-title-text">Apresentação CMS</span>
    </div>
    <button class="btn-close" onclick="closeModal()">
      <span class="material-symbols-rounded">close</span> FECHAR
    </button>
  </div>
  <div class="modal-body">
    <iframe id="fullscreen-iframe" src=""></iframe>
  </div>
</div>

<script>
  // =========================================================================
  // CONFIGURAÇÃO DO REPOSITÓRIO GITHUB
  // =========================================================================
  const GITHUB_USERNAME = "cmsmoc"; 
  const GITHUB_REPO = "site"; 
  const FOLDER_PATH = ".";                
  
  // Paleta de cores oficial da marca para aplicar às pastas/categorias
  const BRAND_COLORS = [
    { bg: 'var(--cms-blue)', text: 'var(--cms-white)' },
    { bg: 'var(--cms-green)', text: 'var(--cms-white)' },
    { bg: 'var(--cms-yellow)', text: 'var(--cms-navy)' },
    { bg: 'var(--cms-navy)', text: 'var(--cms-white)' }
  ];

  // Variáveis Globais
  let allPresentations = []; 
  let categoriesData = {}; // Guarda a cor associada a cada pasta

  const galleryEl = document.getElementById('gallery');
  const filtersEl = document.getElementById('filters-container');
  const modal = document.getElementById('presentation-modal');
  const modalIframe = document.getElementById('fullscreen-iframe');
  const modalTitle = document.getElementById('modal-title-text');
  const modalBadgeContainer = document.getElementById('modal-badge-container');

  // Inicializa o app e busca os dados
  async function init() {
    let colorIndex = 0;

    try {
      // 1. Busca os itens da pasta raiz (ex: /pres)
      const rootUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;
      const rootResponse = await fetch(rootUrl);
      
      if (!rootResponse.ok) throw new Error("Erro na API ao acessar a pasta raiz.");
      const rootItems = await rootResponse.json();

      for (const item of rootItems) {
        if (item.type === 'file' && item.name.endsWith('.html') && item.name !== 'index.html') {
          // Arquivos soltos na raiz vão para a categoria "Geral"
          allPresentations.push(createFileData(item, 'Geral', { bg: 'var(--cms-muted)', text: 'var(--cms-white)' }));
        } 
        else if (item.type === 'dir') {
          // É uma pasta! Vamos definir uma cor para ela
          const catName = formatName(item.name);
          if (!categoriesData[catName]) {
            categoriesData[catName] = BRAND_COLORS[colorIndex % BRAND_COLORS.length];
            colorIndex++;
          }

          // Busca os arquivos dentro dessa subpasta
          const subResponse = await fetch(item.url);
          if (subResponse.ok) {
            const subItems = await subResponse.json();
            for (const subItem of subItems) {
              if (subItem.type === 'file' && subItem.name.endsWith('.html') && subItem.name !== 'index.html') {
                allPresentations.push(createFileData(subItem, catName, categoriesData[catName]));
              }
            }
          }
        }
      }
    } catch (error) {
      console.error(error);
      galleryEl.innerHTML = `<div id="status-message">Erro ao carregar do GitHub. Verifique os limites da API ou o caminho configurado.</div>`;
      return;
    }

    renderFilters();
    renderGallery(allPresentations);
  }

  // Cria o objeto formatado de cada arquivo
  function createFileData(apiItem, categoryName, colorTheme) {
    // Para funcionar no iFrame, o path precisa ser relativo à pasta onde o index.html está rodando.
    // A API do Github retorna "pres/tema1/arq.html". Se já estamos em /pres/, removemos o "pres/"
    let relativePath = apiItem.path;
    if (FOLDER_PATH && relativePath.startsWith(FOLDER_PATH + '/')) {
      relativePath = relativePath.substring(FOLDER_PATH.length + 1);
    }

    return {
      path: relativePath,
      name: apiItem.name,
      title: formatName(apiItem.name.replace('.html', '')),
      category: categoryName,
      color: colorTheme
    };
  }

  // Formata nomes (de "nome_da_pasta" para "Nome Da Pasta")
  function formatName(str) {
    return str
      .replace(/[-_]/g, ' ')
      .replace(/\w\S*/g, function(txt){return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();});
  }

  // Renderiza os botões de Filtro
  function renderFilters() {
    if (allPresentations.length === 0) return;

    // Pega as categorias únicas
    const categories = [...new Set(allPresentations.map(p => p.category))].sort();

    // Cria o botão "Todas"
    let buttonsHTML = `<button class="filter-btn active" onclick="filterGallery('Todas', this)">Todas</button>`;
    
    // Cria um botão para cada categoria/pasta
    categories.forEach(cat => {
      buttonsHTML += `<button class="filter-btn" onclick="filterGallery('${cat}', this)">${cat}</button>`;
    });

    filtersEl.innerHTML = buttonsHTML;
  }

  // Filtra a galeria ao clicar
  function filterGallery(category, btnElement) {
    // Atualiza estilo do botão ativo
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');

    // Filtra array
    const filtered = category === 'Todas' 
      ? allPresentations 
      : allPresentations.filter(p => p.category === category);

    renderGallery(filtered);
  }

  // Renderiza os cartões na tela
  function renderGallery(filesToRender) {
    galleryEl.innerHTML = ''; 

    if (filesToRender.length === 0) {
      galleryEl.innerHTML = '<div id="status-message">Nenhuma apresentação encontrada.</div>';
      return;
    }

    filesToRender.forEach(file => {
      const card = document.createElement('div');
      card.className = 'card';
      // Passamos os dados completos em formato de string escapada para abrir o modal
      card.onclick = () => openModal(file.path, file.title, file.category, file.color.bg, file.color.text);

      card.innerHTML = `
        <div class="card-badge" style="background-color: ${file.color.bg}; color: ${file.color.text};">
          ${file.category}
        </div>
        <div class="thumb-container" style="border-bottom-color: ${file.color.bg}">
          <iframe class="thumb-iframe" src="${file.path}" scrolling="no" tabindex="-1"></iframe>
        </div>
        <div class="card-content">
          <h3 class="card-title">${file.title}</h3>
          <div class="card-meta">
            <span class="material-symbols-rounded" style="font-size: 16px;">html</span> ${file.category}
          </div>
        </div>
      `;
      
      galleryEl.appendChild(card);
    });
  }

  // Controle do Modal (Popup)
  function openModal(filePath, title, category, bg, text) {
    modalTitle.innerText = title;
    
    // Configura o badge dentro do modal para manter consistência
    modalBadgeContainer.innerHTML = `<span class="modal-badge" style="background-color: ${bg}; color: ${text};">${category}</span>`;
    
    modalIframe.src = filePath;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden'; 
  }

  function closeModal() {
    modal.classList.remove('active');
    modalIframe.src = ""; 
    document.body.style.overflow = 'auto'; 
  }

  // Fechar modal com a tecla ESC
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Executa ao carregar
  init();
</script>

</body>
</html>
