<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Regional — CMS Montes Claros</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --cms-navy: #0D2E5A; --cms-blue: #1B6CB5; --cms-green: #1E8A4A; 
      --cms-yellow: #F5C400; --cms-white: #FFFFFF; --cms-off: #F7F8FA; 
      --cms-ink: #111827; --cms-muted: #6B7280; --cms-border: #E5E7EB;
      --font-display: 'Montserrat', sans-serif; --font-body: 'Open Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--cms-off); color: var(--cms-ink); line-height: 1.65; font-size: 15px; }
    
    .cms-wrap { max-width: 1080px; margin: 0 auto; padding: 0 32px; }
    .cms-grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    
    /* Header & Logo */
    .cms-header { background: var(--cms-navy); padding: 80px 0 64px; text-align: center; position: relative; }
    .header-logo { width: 120px; height: auto; margin-bottom: 24px; }
    .cms-display { font-family: var(--font-display); font-size: clamp(32px, 5vw, 64px); font-weight: 900; letter-spacing: -2px; line-height: 0.95; color: var(--cms-white); }
    .cms-eyebrow { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--cms-yellow); margin-bottom: 16px; display: block; }
    
    /* Controles de Busca e Alfabeto */
    .controls-area { background: var(--cms-white); padding: 24px 0; border-bottom: 1px solid var(--cms-border); sticky; top: 0; z-index: 100; }
    .search-box { width: 100%; max-width: 600px; margin: 0 auto 24px; position: relative; }
    .search-input { width: 100%; padding: 16px 24px; border-radius: 50px; border: 2px solid var(--cms-border); font-family: var(--font-body); font-size: 16px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--cms-blue); }
    
    .alphabet-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 800px; margin: 0 auto; }
    .alpha-btn { background: none; border: 1px solid var(--cms-border); border-radius: 4px; padding: 6px 10px; font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--cms-navy); cursor: pointer; transition: all 0.2s; }
    .alpha-btn:hover, .alpha-btn.active { background: var(--cms-blue); color: white; border-color: var(--cms-blue); }
    .alpha-btn.btn-all { background: var(--cms-navy); color: white; border: none; }

    /* Cards e Seções */
    .cms-section { padding: 48px 0; }
    .micro-section { padding-top: 48px; border-top: 1px solid var(--cms-border); margin-top: 48px; }
    .micro-section:first-child { padding-top: 0; border-top: none; margin-top: 0; }
    .cms-h2 { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--cms-navy); margin-bottom: 24px; }
    
    .mun-card { background: var(--cms-white); border: 1px solid var(--cms-border); border-radius: 10px; padding: 24px; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 180px; }
    .mun-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); border-color: var(--cms-blue); }
    .mun-nome { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--cms-navy); line-height: 1.2; margin-bottom: 8px; }
    .mun-card.pendente { background: var(--cms-off); opacity: 0.6; filter: grayscale(100%); }
    .mun-card.ativo { border-top: 4px solid var(--cms-green); }
    .mun-dados { font-size: 13px; color: var(--cms-muted); margin-bottom: 16px; }
    
    /* Modal (Simplificado para o exemplo) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--cms-white); border-radius: 12px; width: 100%; max-width: 560px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .modal-header { background: var(--cms-navy); padding: 24px 32px; color: var(--cms-white); position: relative; border-radius: 12px 12px 0 0; }
    .modal-body { padding: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-family: var(--font-display); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px; border: 1px solid var(--cms-border); border-radius: 6px; outline: none; }
    .btn-primary { background: var(--cms-yellow); color: var(--cms-navy); padding: 14px; border: none; font-family: var(--font-display); font-weight: 700; cursor: pointer; width: 100%; border-radius: 6px; }

    #no-results { text-align: center; padding: 40px; font-family: var(--font-display); color: var(--cms-muted); display: none; }
  </style>
</head>
<body>

  <header class="cms-header">
    <div class="cms-wrap">
      <img src="https://raw.githubusercontent.com/cmsmoc/secretariaexecutiva/main/logo/iconcms1.png" alt="Logo CMS" class="header-logo">
      <span class="cms-eyebrow">Rede Norte-Mineira</span>
      <h1 class="cms-display">CADASTRO DE<br><span style="color:var(--cms-yellow);">CONSELHOS</span></h1>
    </div>
  </header>

  <section class="controls-area">
    <div class="cms-wrap">
      <div class="search-box">
        <input type="text" id="input-busca" class="search-input" placeholder="Buscar município por nome..." oninput="filtrar()">
      </div>
      <div class="alphabet-nav" id="alphabet-nav">
        <button class="alpha-btn btn-all active" onclick="filtrarPorLetra('')">TODOS</button>
        </div>
    </div>
  </section>

  <main class="cms-section">
    <div class="cms-wrap">
      <div id="loading-state" style="text-align:center; font-weight:bold;">CARREGANDO...</div>
      <div id="no-results">Nenhum município encontrado para os filtros selecionados.</div>
      <div id="main-container"></div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <button style="position:absolute; right:20px; top:20px; color:white; background:none; border:none; font-size:24px; cursor:pointer;" onclick="closeModal()">×</button>
        <span class="cms-eyebrow" id="modal-micro-nome">Microrregião</span>
        <h2 id="modal-municipio-nome">Cidade</h2>
      </div>
      <div class="modal-body">
        <form id="cadastro-form" onsubmit="submitForm(event)">
          <input type="hidden" id="id_ibge" name="id_ibge">
          <input type="hidden" id="municipio_nome" name="municipio_nome">
          <div class="form-group"><label class="form-label">Secretário(a) Executivo(a)</label><input type="text" id="secretario" name="secretario_executivo" class="form-control" required></div>
          <div class="form-group"><label class="form-label">Presidente</label><input type="text" id="presidente" name="presidente" class="form-control" required></div>
          <div class="form-group"><label class="form-label">E-mail</label><input type="email" id="email" name="email" class="form-control" required></div>
          <div class="form-group"><label class="form-label">Telefone</label><input type="text" id="telefone" name="telefone" class="form-control" required></div>
          <button type="submit" class="btn-primary" id="btn-submit">SALVAR DADOS</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const URL_GITHUB_JSON = 'https://raw.githubusercontent.com/cmsmoc/site/main/dados/conselhos.json';
    const URL_GAS_POST = 'https://script.google.com/macros/s/AKfycbzMpG-Ap7JLioorSgPjGGq-x4xSS5q0rtxIN4WuUhNZ98fhDo9yHDTUvVhpf0MQEbKvEw/exec';

    let baseDados = [];
    let filtroLetra = '';

    document.addEventListener("DOMContentLoaded", () => {
      gerarAlfabeto();
      carregarDados();
    });

    function gerarAlfabeto() {
      const nav = document.getElementById('alphabet-nav');
      const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
      letras.forEach(L => {
        const btn = document.createElement('button');
        btn.className = 'alpha-btn';
        btn.innerText = L;
        btn.onclick = (e) => {
          document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          filtrarPorLetra(L);
        };
        nav.appendChild(btn);
      });
    }

    async function carregarDados() {
      try {
        const response = await fetch(`${URL_GITHUB_JSON}?v=${new Date().getTime()}`);
        const data = await response.json();
        baseDados = data.municipios;
        renderizar(baseDados);
        document.getElementById('loading-state').style.display = 'none';
      } catch (e) { console.error(e); }
    }

    function filtrarPorLetra(letra) {
      filtroLetra = letra;
      if(letra === '') {
        document.querySelector('.btn-all').classList.add('active');
      }
      filtrar();
    }

    function filtrar() {
      const termo = document.getElementById('input-busca').value.toLowerCase();
      
      const filtrados = baseDados.filter(m => {
        const matchNome = m.nome.toLowerCase().includes(termo);
        const matchLetra = filtroLetra === '' || m.nome.toUpperCase().startsWith(filtroLetra);
        return matchNome && matchLetra;
      });

      renderizar(filtrados);
    }

    function renderizar(lista) {
      const container = document.getElementById('main-container');
      const noResults = document.getElementById('no-results');
      container.innerHTML = '';

      if (lista.length === 0) {
        noResults.style.display = 'block';
        return;
      }
      noResults.style.display = 'none';

      const grupos = {};
      lista.forEach(m => {
        if (!grupos[m.micro]) grupos[m.micro] = [];
        grupos[m.micro].push(m);
      });

      Object.keys(grupos).sort().forEach(micro => {
        const section = document.createElement('div');
        section.className = 'micro-section';
        section.innerHTML = `<span class="cms-eyebrow">Regional</span><h2 class="cms-h2">${micro}</h2>`;
        
        const grid = document.createElement('div');
        grid.className = 'cms-grid-3';

        grupos[micro].sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(mun => {
          const card = document.createElement('div');
          card.className = `mun-card ${mun.cadastrado ? 'ativo' : 'pendente'}`;
          card.onclick = () => openModal(mun);
          card.innerHTML = `
            <div>
              <span class="tag ${mun.cadastrado ? 'tag-ativo':'tag-pendente'}">${mun.cadastrado ? '✔ ATUALIZADO':'PENDENTE'}</span>
              <h3 class="mun-nome" style="margin-top:12px">${mun.nome}</h3>
              ${mun.cadastrado ? `<div class="mun-dados">Sec: ${mun.dados.secretario}</div>`:''}
            </div>
            <span style="font-size:10px; font-weight:700; color:var(--cms-blue)">DETALHES →</span>
          `;
          grid.appendChild(card);
        });
        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    function openModal(mun) {
      document.getElementById('modal-municipio-nome').innerText = mun.nome;
      document.getElementById('modal-micro-nome').innerText = mun.micro;
      document.getElementById('id_ibge').value = mun.id_ibge;
      document.getElementById('municipio_nome').value = mun.nome;
      if(mun.cadastrado) {
        document.getElementById('secretario').value = mun.dados.secretario;
        document.getElementById('presidente').value = mun.dados.presidente;
        document.getElementById('email').value = mun.dados.contato.email;
        document.getElementById('telefone').value = mun.dados.contato.tel;
      } else {
        document.getElementById('cadastro-form').reset();
      }
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    async function submitForm(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.disabled = true; btn.innerText = "ENVIANDO...";
      const payload = Object.fromEntries(new FormData(e.target).entries());
      
      try {
        await fetch(URL_GAS_POST, { method: 'POST', body: JSON.stringify(payload) });
        alert("Dados salvos! O site atualizará em alguns instantes.");
        closeModal();
        carregarDados();
      } catch (err) { alert("Erro ao salvar."); }
      btn.disabled = false; btn.innerText = "SALVAR DADOS";
    }
  </script>
</body>
</html>
