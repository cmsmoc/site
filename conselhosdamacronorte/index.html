<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Regional — CMS Montes Claros</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* CSS MESTRE */
    :root {
      --cms-navy: #0D2E5A; --cms-blue: #1B6CB5; --cms-green: #1E8A4A; 
      --cms-yellow: #F5C400; --cms-white: #FFFFFF; --cms-off: #F7F8FA; 
      --cms-ink: #111827; --cms-muted: #6B7280; --cms-border: #E5E7EB;
      --font-display: 'Montserrat', sans-serif; --font-body: 'Open Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--cms-off); color: var(--cms-ink); line-height: 1.65; font-size: 15px; }
    
    .cms-wrap { max-width: 1080px; margin: 0 auto; padding: 0 32px; }
    .cms-grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    
    .cms-display { font-family: var(--font-display); font-size: clamp(32px, 5vw, 64px); font-weight: 900; letter-spacing: -2px; line-height: 0.95; color: var(--cms-white); }
    .cms-eyebrow { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--cms-yellow); margin-bottom: 16px; display: block; }
    .cms-h2 { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--cms-navy); letter-spacing: -0.5px; margin-bottom: 24px; }
    
    .cms-header { background: var(--cms-navy); padding: 64px 0; position: relative; overflow: hidden; }
    .cms-section { padding: 64px 0; }
    
    .topbar { background: var(--cms-navy); padding: 16px 32px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; }
    .topbar img { height: 28px; }

    /* Cards de Município */
    .mun-card { background: var(--cms-white); border: 1px solid var(--cms-border); border-radius: 10px; padding: 24px; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 180px; }
    .mun-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); border-color: var(--cms-blue); }
    .mun-nome { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--cms-navy); line-height: 1.2; margin-bottom: 8px; }
    
    .mun-card.pendente { background: var(--cms-off); opacity: 0.6; filter: grayscale(100%); }
    .mun-card.pendente:hover { opacity: 1; filter: grayscale(0%); border-color: var(--cms-yellow); }
    .mun-card.ativo { border-top: 4px solid var(--cms-green); }
    
    .mun-dados { font-size: 13px; color: var(--cms-muted); margin-bottom: 16px; }
    .mun-dados strong { color: var(--cms-ink); }

    .tag { display: inline-block; font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 4px; padding: 4px 10px; }
    .tag-pendente { background: var(--cms-border); color: var(--cms-muted); }
    .tag-ativo { background: #D1FAE5; color: #065F46; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; opacity: 0; transition: opacity 0.3s; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-box { background: var(--cms-white); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transform: translateY(20px); transition: transform 0.3s; }
    .modal-overlay.active .modal-box { transform: translateY(0); }
    
    .modal-header { background: var(--cms-navy); padding: 24px 32px; color: var(--cms-white); position: relative; }
    .modal-header h2 { font-family: var(--font-display); font-weight: 800; font-size: 24px; }
    .btn-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; opacity: 0.7; }
    .btn-close:hover { opacity: 1; color: var(--cms-yellow); }
    
    .modal-body { padding: 32px; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--cms-navy); margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 16px; font-family: var(--font-body); font-size: 15px; border: 1px solid var(--cms-border); border-radius: 6px; background: var(--cms-off); transition: border-color 0.2s; outline: none; }
    .form-control:focus { border-color: var(--cms-blue); background: var(--cms-white); }
    
    .btn { display: inline-block; font-family: var(--font-display); font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 14px 28px; border-radius: 6px; border: none; cursor: pointer; transition: opacity 0.2s; width: 100%; }
    .btn-primary { background: var(--cms-yellow); color: var(--cms-navy); }
    .btn-primary:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    #loading-state { text-align: center; padding: 60px 0; font-family: var(--font-display); font-weight: 700; color: var(--cms-blue); letter-spacing: 2px; }
    
    /* Grupo Microrregião */
    .micro-section { padding-top: 48px; border-top: 1px solid var(--cms-border); margin-top: 48px; }
    .micro-section:first-child { padding-top: 0; border-top: none; margin-top: 0; }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="cms-wrap" style="margin:0; padding:0;">
      <img src="https://cmsmoc.github.io/secretariaexecutiva/logo/logohwh.png" alt="CMS Montes Claros">
    </div>
  </nav>

  <header class="cms-header">
    <div class="cms-wrap">
      <span class="cms-eyebrow">Rede Norte-Mineira</span>
      <h1 class="cms-display">CADASTRO DE<br><span style="color:var(--cms-yellow);">CONSELHOS</span></h1>
      <p style="color: rgba(255,255,255,0.7); max-width: 500px; margin-top: 16px;">
        Selecione o seu município abaixo para atualizar a composição da mesa diretora e os contatos oficiais.
      </p>
    </div>
  </header>

  <main class="cms-section">
    <div class="cms-wrap">
      <div id="loading-state">CARREGANDO DADOS DA REGIÃO...</div>
      <div id="main-container" style="display: none;"></div>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <button class="btn-close" onclick="closeModal()">×</button>
        <span class="cms-eyebrow" style="margin-bottom: 4px;" id="modal-micro-nome">Microrregião</span>
        <h2 id="modal-municipio-nome">Nome da Cidade</h2>
      </div>
      <div class="modal-body">
        <form id="cadastro-form" onsubmit="submitForm(event)">
          <input type="hidden" id="id_ibge" name="id_ibge">
          <input type="hidden" id="municipio_nome" name="municipio_nome">

          <div class="form-group">
            <label class="form-label">Secretário(a) Executivo(a)</label>
            <input type="text" id="secretario" name="secretario_executivo" class="form-control" required placeholder="Nome completo">
          </div>

          <div class="form-group">
            <label class="form-label">Presidente do Conselho</label>
            <input type="text" id="presidente" name="presidente" class="form-control" required placeholder="Nome completo">
          </div>

          <div class="form-group">
            <label class="form-label">Mesa Diretora (Outros Membros)</label>
            <textarea id="mesa" name="mesa_diretora" class="form-control" rows="3" placeholder="Ex: Maria (Vice), João (Tesoureiro)"></textarea>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label class="form-label">E-mail Institucional</label>
              <input type="email" id="email" name="email" class="form-control" required placeholder="email@...">
            </div>
            <div class="form-group">
              <label class="form-label">Telefone / WhatsApp</label>
              <input type="text" id="telefone" name="telefone" class="form-control" required placeholder="(38) 99999-9999" oninput="mascaraTelefone(this)">
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="btn-submit">SALVAR DADOS</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const URL_GITHUB_JSON = 'https://raw.githubusercontent.com/cmsmoc/site/main/data/conselhos.json';
    const URL_GAS_POST = 'https://script.google.com/macros/s/AKfycbzMpG-Ap7JLioorSgPjGGq-x4xSS5q0rtxIN4WuUhNZ98fhDo9yHDTUvVhpf0MQEbKvEw/exec';

    let baseDados = [];

    document.addEventListener("DOMContentLoaded", () => {
      carregarDados();
    });

    async function carregarDados() {
      try {
        const response = await fetch(`${URL_GITHUB_JSON}?v=${new Date().getTime()}`);
        if (!response.ok) throw new Error("Erro ao carregar banco de dados.");
        
        const data = await response.json();
        baseDados = data.municipios;
        renderizarGrid();
      } catch (error) {
        document.getElementById('loading-state').innerText = "ERRO AO CARREGAR. VERIFIQUE O LINK DO GITHUB.";
        console.error(error);
      }
    }

    function renderizarGrid() {
      const container = document.getElementById('main-container');
      const loading = document.getElementById('loading-state');
      
      container.innerHTML = '';
      
      // 1. Agrupa os municípios por Microrregião
      const grupos = {};
      baseDados.forEach(mun => {
        const micro = mun.micro || 'Outras Regiões'; // Fallback se a célula estiver vazia
        if (!grupos[micro]) grupos[micro] = [];
        grupos[micro].push(mun);
      });

      // 2. Ordena as Microrregiões alfabeticamente
      const microsOrdenadas = Object.keys(grupos).sort();

      microsOrdenadas.forEach(micro => {
        // Ordena os municípios alfabeticamente dentro da microrregião
        grupos[micro].sort((a, b) => a.nome.localeCompare(b.nome));

        // Cria o container da Seção (Micro)
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'micro-section';
        
        // Cabeçalho da Microrregião
        const headerHTML = `
          <span class="cms-eyebrow" style="color: var(--cms-blue);">Microrregião</span>
          <h2 class="cms-h2">${micro}</h2>
        `;
        
        // Grid dos cards
        const gridDiv = document.createElement('div');
        gridDiv.className = 'cms-grid-3';

        grupos[micro].forEach(mun => {
          const isCadastrado = mun.cadastrado;
          const cardClass = isCadastrado ? 'mun-card ativo' : 'mun-card pendente';
          const tagHtml = isCadastrado 
            ? `<span class="tag tag-ativo">✔ ATUALIZADO</span>` 
            : `<span class="tag tag-pendente">PENDENTE</span>`;
            
          const infoHtml = isCadastrado && mun.dados
            ? `<div class="mun-dados">Sec: <strong>${mun.dados.secretario}</strong><br>Pres: <strong>${mun.dados.presidente}</strong></div>`
            : `<div class="mun-dados">Nenhum dado registrado.</div>`;

          const card = document.createElement('div');
          card.className = cardClass;
          card.onclick = () => openModal(mun.id_ibge);
          
          card.innerHTML = `
            <div>
              ${tagHtml}
              <h3 class="mun-nome" style="margin-top: 12px;">${mun.nome}</h3>
              ${infoHtml}
            </div>
            <div>
              <span style="font-family:'Montserrat', sans-serif; font-size:10px; font-weight:700; color:var(--cms-blue); letter-spacing:1px;">
                ${isCadastrado ? 'EDITAR DADOS →' : 'CADASTRAR →'}
              </span>
            </div>
          `;
          gridDiv.appendChild(card);
        });

        sectionDiv.innerHTML = headerHTML;
        sectionDiv.appendChild(gridDiv);
        container.appendChild(sectionDiv);
      });

      loading.style.display = 'none';
      container.style.display = 'block';
    }

    function openModal(id_ibge) {
      const mun = baseDados.find(m => m.id_ibge === id_ibge);
      if (!mun) return;

      document.getElementById('id_ibge').value = mun.id_ibge;
      document.getElementById('municipio_nome').value = mun.nome;
      document.getElementById('modal-municipio-nome').innerText = mun.nome;
      document.getElementById('modal-micro-nome').innerText = mun.micro || 'Regional';

      if (mun.cadastrado && mun.dados) {
        document.getElementById('secretario').value = mun.dados.secretario || '';
        document.getElementById('presidente').value = mun.dados.presidente || '';
        document.getElementById('mesa').value = mun.dados.mesa || '';
        document.getElementById('email').value = mun.dados.contato?.email || '';
        document.getElementById('telefone').value = mun.dados.contato?.tel || '';
      } else {
        document.getElementById('cadastro-form').reset();
        document.getElementById('id_ibge').value = mun.id_ibge;
        document.getElementById('municipio_nome').value = mun.nome;
      }

      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    async function submitForm(event) {
      event.preventDefault();
      
      const form = document.getElementById('cadastro-form');
      const btn = document.getElementById('btn-submit');
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      btn.disabled = true;
      btn.innerText = "ENVIANDO PARA O SISTEMA...";

      try {
        const response = await fetch(URL_GAS_POST, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.status === "sucesso") {
          btn.style.background = "var(--cms-green)";
          btn.style.color = "var(--cms-white)";
          btn.innerText = "✔ CADASTRADO COM SUCESSO";
          
          setTimeout(() => {
            closeModal();
            btn.style.background = "var(--cms-yellow)";
            btn.style.color = "var(--cms-navy)";
            btn.disabled = false;
            btn.innerText = "SALVAR DADOS";
            
            document.getElementById('loading-state').innerText = "ATUALIZANDO GRID...";
            document.getElementById('loading-state').style.display = 'block';
            document.getElementById('main-container').style.display = 'none';
            carregarDados(); 
          }, 2000);
        } else {
          throw new Error(result.mensagem);
        }

      } catch (error) {
        console.error(error);
        alert("Erro ao salvar os dados. Verifique o console ou a permissão do Apps Script.");
        btn.disabled = false;
        btn.innerText = "TENTAR NOVAMENTE";
      }
    }

    function mascaraTelefone(input) {
      let v = input.value.replace(/\D/g, "");
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
      if (v.length > 9) v = `${v.substring(0, 9)}-${v.substring(9)}`;
      input.value = v;
    }
  </script>
</body>
</html>
