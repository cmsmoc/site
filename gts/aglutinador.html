<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aglutinador GT | 11ª CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Georama:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Georama', 'sans-serif'] }, colors: { brand: { 'azul-sus': '#1A5EA8', 'azul-medio': '#2E8BC0', 'azul-wave': '#0D3D6B', 'verde-sus': '#3AAA35', 'amarelo': '#F5C800', 'cinza-off': '#F4F7FB', 'cinza-texto': '#2C3E50', 'cinza-medio': '#6B7F96', 'cinza-borda': '#D6E4F0' } }, boxShadow: { 'card': '0 4px 24px rgba(26,94,168,.10)', 'hover': '0 12px 40px rgba(26,94,168,.18)' } } } }
    </script>
    <style>
        body { background-color: #F4F7FB; color: #2C3E50; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #F4F7FB; } ::-webkit-scrollbar-thumb { background: #D6E4F0; border-radius: 999px; }
        .nav-tabs { display: flex; background: #0D3D6B; padding: 0 16px; border-bottom: 2px solid rgba(255,255,255,0.1); overflow-x: auto; }
        .nav-tab { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; padding: 16px 20px; color: rgba(255,255,255,.55); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; white-space: nowrap; }
        .nav-tab.active { color: #F5C800; border-bottom-color: #F5C800; }
        .tab-content { display: none; height: calc(100vh - 49px); } .tab-content.active { display: flex; }
        #network-status { transition: all 0.3s; }
    </style>
</head>
<body class="w-full flex flex-col overflow-hidden font-sans">

    <nav class="nav-tabs z-40 flex-shrink-0 flex justify-between items-center w-full">
        <div class="flex">
            <div class="nav-tab active" onclick="switchTab('tab-aglutinar')">Aglutinar</div>
            <div class="nav-tab" onclick="switchTab('tab-macros')">Árvore de Consolidação</div>
        </div>
        <div class="flex items-center gap-4 text-white">
            <div id="network-status" class="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 bg-green-500/20 text-green-400 px-3 py-1 rounded-full">
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div> Online
            </div>
            <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full transition-colors flex items-center gap-1"><i class="ph-bold ph-sign-out"></i> Sair</a>
        </div>
    </nav>

    <div id="tab-aglutinar" class="tab-content active flex-col md:flex-row w-full">
        <section class="w-full md:w-[55%] h-full flex flex-col bg-brand-cinza-off border-r border-brand-cinza-borda relative z-10">
            <div class="px-6 md:px-8 py-4 relative z-20 flex-shrink-0 bg-white border-b border-brand-cinza-borda shadow-sm">
                
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span id="gt-badge-title" class="bg-gray-800 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-sm flex items-center gap-1"><i class="ph-fill ph-users-three"></i> GT X</span>
                        <span id="badge-context" class="bg-brand-azul-sus text-white text-[9px] font-extrabold uppercase tracking-widest px-2 py-1 rounded-full">Fase 1</span>
                        <span class="text-xs font-bold text-brand-cinza-medio" id="count-pendentes">A carregar...</span>
                    </div>
                </div>

                <div class="flex bg-brand-cinza-off border border-brand-cinza-borda rounded-brand-pill p-1 mb-3 w-full md:w-4/5">
                    <button onclick="setPhase(1)" id="btn-fase-1" class="flex-1 py-1.5 text-[10px] md:text-[11px] font-extrabold uppercase tracking-widest rounded-brand-pill bg-white text-brand-azul-sus shadow-sm transition-all border border-brand-cinza-borda">Fase 1: Propostas Brutas</button>
                    <button onclick="setPhase(2)" id="btn-fase-2" class="flex-1 py-1.5 text-[10px] md:text-[11px] font-extrabold uppercase tracking-widest rounded-brand-pill text-brand-cinza-medio hover:text-brand-cinza-texto transition-all border border-transparent">Fase 2: Super Macros</button>
                </div>

                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-brand-cinza-medio"></i>
                    <input type="text" id="search-input" placeholder="Buscar por palavra-chave ou ID..." class="w-full pl-10 pr-4 py-2 border-[1.5px] border-brand-cinza-borda rounded-brand-sm focus:border-brand-azul-medio outline-none text-sm text-brand-cinza-texto transition-all">
                </div>
            </div>

            <div id="loading-state" class="flex-1 flex flex-col items-center justify-center text-brand-cinza-medio">
                <i class="ph ph-spinner-gap animate-spin text-4xl text-brand-azul-sus mb-3"></i>
                <p class="font-bold text-xs uppercase tracking-widest" id="loading-text">Sincronizando Base de Dados...</p>
            </div>

            <div class="flex-1 overflow-y-auto px-4 md:px-8 py-6 space-y-3 custom-scrollbar hidden" id="proposals-list"></div>
        </section>

        <section id="workspace-panel" class="w-full md:w-[45%] h-full flex flex-col bg-white">
            <div class="bg-brand-cinza-off p-4 border-b border-brand-cinza-borda flex items-center justify-between">
                <h2 id="workspace-title" class="text-xl font-extrabold text-brand-cinza-texto">Redação Macro</h2>
            </div>

            <div class="flex-1 flex flex-col p-6 gap-4 overflow-y-auto">
                <div id="selection-indicator" class="bg-white border border-brand-cinza-borda px-4 py-3 rounded-brand-sm flex items-center gap-3 text-sm shadow-sm transition-all duration-300">
                    <i class="ph-fill ph-info text-xl indicator-icon text-brand-cinza-medio"></i>
                    <span id="selected-count" class="font-bold text-brand-cinza-medio">Nenhuma selecionada</span>
                </div>

                <div class="flex flex-col flex-1 min-h-[250px] relative">
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-[10px] font-extrabold text-brand-azul-sus uppercase tracking-widest flex items-center gap-2">Área de Edição Final <span id="draft-badge" class="hidden text-[8px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">Rascunho Salvo Localmente</span></label>
                        <button id="btn-ia" onclick="suggestMacroIA()" class="text-[10px] font-extrabold uppercase tracking-widest bg-[#E8F4FD] text-brand-azul-sus px-3 py-1.5 rounded-full hover:bg-brand-azul-sus hover:text-white transition-colors disabled:opacity-50" disabled><i class="ph-fill ph-sparkle"></i> Analisar IA</button>
                    </div>
                    <textarea id="macro-textarea" class="w-full flex-1 p-4 border-[1.5px] border-brand-cinza-borda rounded-brand bg-white text-sm text-brand-cinza-texto focus:border-brand-azul-medio outline-none resize-none shadow-inner disabled:bg-brand-cinza-off transition-all" placeholder="Selecione cards e redija aqui..." disabled></textarea>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="w-full sm:w-1/3">
                        <select id="abrangencia-select" class="w-full border-[1.5px] border-brand-cinza-borda rounded-brand-sm px-3 py-3 bg-white text-sm font-bold text-brand-cinza-texto focus:border-brand-azul-medio outline-none disabled:bg-brand-cinza-off" disabled>
                            <option value="" disabled selected>ABRANGÊNCIA...</option>
                            <option value="Municipal">MUNICIPAL</option>
                            <option value="Estadual">ESTADUAL</option>
                            <option value="Nacional">NACIONAL</option>
                        </select>
                    </div>
                    <button id="save-btn" class="flex-1 bg-brand-cinza-medio text-white font-extrabold text-xs uppercase tracking-widest py-3 px-6 rounded-full shadow-card transition-all disabled:opacity-50 flex items-center justify-center gap-2" disabled><i class="ph-bold ph-floppy-disk text-lg"></i> <span id="save-btn-text">Salvar Macro</span></button>
                </div>
            </div>
        </section>
    </div>

    <div id="tab-macros" class="tab-content w-full flex-col bg-brand-cinza-off overflow-y-auto pb-20 custom-scrollbar">
        <div class="max-w-4xl mx-auto w-full p-6 flex flex-col gap-6" id="tree-list"></div>
    </div>

    <div id="toast" class="fixed top-8 right-8 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-4 transition-all opacity-0 translate-y-[-20px] pointer-events-none z-[999]">
        <i class="ph-fill ph-info text-2xl" id="toast-icon"></i>
        <div>
            <h4 class="font-extrabold text-sm tracking-wide" id="toast-title">Aviso</h4>
            <p class="text-xs text-white/80 font-medium" id="toast-msg">Mensagem...</p>
        </div>
    </div>

    <script>
        // 1. CONFIGURAÇÕES INICIAIS
        const API_URL = 'https://script.google.com/macros/s/AKfycbxbAg6XJHHksVwktBFq3VeWgPpeIjv7j82spT4ap2VhMW-s68BFIY8oRp0R61quycBJsg/exec';
        
        // Pega o GT da URL (Ex: ?gt=1). Se não tiver, padrão é vazio (mostra tudo)
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_GT = urlParams.get('gt') ? `GT ${urlParams.get('gt')}` : null;
        
        if(CURRENT_GT) {
            document.getElementById('gt-badge-title').innerHTML = `<i class="ph-fill ph-users-three"></i> ${CURRENT_GT}`;
        } else {
            document.getElementById('gt-badge-title').classList.add('hidden');
        }

        let rawProposals = []; let rawMacros = []; let rawSuperMacros = [];
        let selectedIds = new Set(); let searchQuery = ''; let currentPhase = 1;

        // Monitor de Rede (Offline/Online)
        window.addEventListener('online', () => {
            const badge = document.getElementById('network-status');
            badge.className = "text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 bg-green-500/20 text-green-400 px-3 py-1 rounded-full";
            badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div> Online`;
            showToast('Conectado', 'Sistema sincronizado com o servidor.', 'success');
        });
        window.addEventListener('offline', () => {
            const badge = document.getElementById('network-status');
            badge.className = "text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 bg-red-500/20 text-red-400 px-3 py-1 rounded-full";
            badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-400"></div> Offline`;
            showToast('Sem Internet', 'Edições serão salvas no rascunho local.', 'error');
        });

        // ==========================================
        // AUTO-SAVE E CACHE LOCAL (SEGURANÇA)
        // ==========================================
        const DRAFT_KEY = `draft_phase_${currentPhase}_${CURRENT_GT || 'all'}`;
        const CACHE_KEY = `data_cache_${CURRENT_GT || 'all'}`;

        document.getElementById('macro-textarea').addEventListener('input', (e) => {
            localStorage.setItem(DRAFT_KEY, e.target.value);
            document.getElementById('draft-badge').classList.remove('hidden');
            validateForm();
        });

        function checkDraft() {
            const savedDraft = localStorage.getItem(DRAFT_KEY);
            if(savedDraft) {
                document.getElementById('macro-textarea').value = savedDraft;
                document.getElementById('draft-badge').classList.remove('hidden');
            } else {
                document.getElementById('draft-badge').classList.add('hidden');
            }
        }

        // ==========================================
        // CARREGAMENTO DE DADOS E FILTRO POR GT
        // ==========================================
        async function loadData() {
            try {
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                const result = await response.json();
                if (result.success) {
                    rawProposals = result.propostas; rawMacros = result.macros; rawSuperMacros = result.superMacros;
                    // Salva um cache seguro no computador
                    localStorage.setItem(CACHE_KEY, JSON.stringify(result));
                    initApp();
                } else throw new Error(result.error);
            } catch (error) {
                // FALLBACK OFFLINE: Puxa o último cache salvo
                const cachedData = localStorage.getItem(CACHE_KEY);
                if (cachedData) {
                    const result = JSON.parse(cachedData);
                    rawProposals = result.propostas; rawMacros = result.macros; rawSuperMacros = result.superMacros;
                    initApp();
                    showToast('Modo Cache', 'Carregado do último acesso offline.', 'error');
                } else {
                    document.getElementById('loading-state').innerHTML = `<i class="ph-fill ph-warning text-4xl text-brand-amarelo mb-2"></i><p class="font-bold text-xs">Erro Crítico / Sem Cache</p>`;
                }
            }
        }

        function initApp() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('proposals-list').classList.remove('hidden');
            renderProposals();
            checkDraft();
        }

        function renderProposals() {
            const domList = document.getElementById('proposals-list'); domList.innerHTML = '';
            
            // FILTRA POR FASE E PELO GT DA SALA!
            let base = currentPhase === 1 ? rawProposals.filter(p => p.status !== 'agglutinated') : rawMacros.filter(m => m.status !== 'super_agglutinated');
            
            if(CURRENT_GT && currentPhase === 1) {
                // Na Fase 1, o aglutinador SÓ MOSTRA propostas que contém o número do GT no campo
                base = base.filter(p => p.gt && p.gt.includes(urlParams.get('gt')));
            }

            document.getElementById('count-pendentes').textContent = `${base.length} Pendentes nesta sala`;

            const filtered = base.filter(item => {
                const t = (item.text || item.texto).toLowerCase();
                const id = item.id.toLowerCase();
                return t.includes(searchQuery.toLowerCase()) || id.includes(searchQuery.toLowerCase());
            });

            const fragment = document.createDocumentFragment();
            filtered.forEach(item => {
                const isSelected = selectedIds.has(item.id);
                const card = document.createElement('div');
                let classes = `bg-white border-[1.5px] rounded-brand p-4 relative flex flex-col gap-2 shadow-sm cursor-pointer transition-all ${isSelected ? 'ring-2' : ''} `;
                classes += currentPhase === 1 ? (isSelected ? 'border-brand-azul-sus bg-brand-azul-claro/10 ring-brand-azul-sus/20' : 'border-brand-cinza-borda') : (isSelected ? 'border-[#3AAA35] bg-[#E8F8EC] ring-[#3AAA35]/20' : 'border-brand-cinza-borda');
                
                card.className = classes; card.onclick = () => toggleSelection(item.id);

                card.innerHTML = `
                    <div class="flex items-start gap-3 mt-1">
                        <div class="w-5 h-5 rounded border-[1.5px] flex items-center justify-center shrink-0 mt-0.5 ${isSelected ? 'bg-gray-800 text-white' : ''}">
                            ${isSelected ? '<i class="ph-bold ph-check text-xs"></i>' : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <span class="text-[10px] font-extrabold font-mono px-2 py-1 rounded bg-gray-100 mb-2 inline-block border">${item.id}</span>
                            <p class="text-sm font-medium text-brand-cinza-texto leading-snug">${item.text || item.texto}</p>
                        </div>
                    </div>`;
                fragment.appendChild(card);
            });
            domList.appendChild(fragment);
        }

        // ==========================================
        // RESTO DO SISTEMA (LÓGICA PADRÃO)
        // ==========================================
        function toggleSelection(id) {
            const base = currentPhase === 1 ? rawProposals : rawMacros;
            const item = base.find(p => p.id === id);
            
            if (selectedIds.has(id)) selectedIds.delete(id);
            else {
                selectedIds.add(id);
                const prefix = currentPhase === 1 ? 'Origem' : 'Macro';
                const text = currentPhase === 1 ? item.text : item.texto;
                const appendText = `[${prefix} ${id}]: ${text}`;
                const domTextarea = document.getElementById('macro-textarea');
                domTextarea.value = domTextarea.value ? domTextarea.value + `\n\n${appendText}` : appendText;
                
                // Dispara o Auto-Save
                localStorage.setItem(DRAFT_KEY, domTextarea.value);
                document.getElementById('draft-badge').classList.remove('hidden');
            }
            renderProposals(); updateWorkspace();
        }

        function updateWorkspace() {
            const count = selectedIds.size;
            document.getElementById('selected-count').textContent = count === 0 ? "Nenhuma selecionada" : `${count} em análise`;
            document.getElementById('macro-textarea').disabled = document.getElementById('abrangencia-select').disabled = document.getElementById('btn-ia').disabled = count === 0;
            validateForm();
        }

        function validateForm() {
            const domTextarea = document.getElementById('macro-textarea');
            const domAbrangencia = document.getElementById('abrangencia-select');
            const domSaveBtn = document.getElementById('save-btn');
            
            if (selectedIds.size > 0 && domTextarea.value.trim().length > 5 && domAbrangencia.value !== "") {
                domSaveBtn.disabled = false; 
                domSaveBtn.className = currentPhase === 1 ? "flex-1 bg-brand-azul-sus text-white font-extrabold text-xs uppercase tracking-widest py-3 px-6 rounded-full shadow-card transition-all" : "flex-1 bg-[#3AAA35] text-white font-extrabold text-xs uppercase tracking-widest py-3 px-6 rounded-full shadow-card transition-all";
            } else {
                domSaveBtn.disabled = true; domSaveBtn.className = "flex-1 bg-gray-300 text-gray-500 font-extrabold text-xs uppercase tracking-widest py-3 px-6 rounded-full";
            }
        }

        function setPhase(phase) {
            currentPhase = phase; selectedIds.clear();
            document.getElementById('macro-textarea').value = '';
            // Atualiza os botões visuais (mesma lógica do arquivo anterior)
            checkDraft();
            renderProposals(); updateWorkspace();
        }

        async function handleSave() {
            if(!navigator.onLine) {
                showToast('Erro Crítico', 'Você está offline. O texto está salvo no seu rascunho, aguarde a internet voltar para enviar ao servidor.', 'error');
                return;
            }

            const act = currentPhase === 1 ? 'create' : 'create_super_macro';
            const payload = { action: act, macroText: document.getElementById('macro-textarea').value, abrangencia: document.getElementById('abrangencia-select').value, originIds: Array.from(selectedIds) };
            
            const btn = document.getElementById('save-btn');
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i> Salvando...'; btn.disabled = true;

            try {
                const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                const result = await response.json();
                if(result.success) {
                    showToast('Sucesso', 'Consolidação salva no Banco de Dados Central.');
                    // Limpa o rascunho após sucesso
                    localStorage.removeItem(DRAFT_KEY);
                    document.getElementById('draft-badge').classList.add('hidden');
                    
                    selectedIds.clear(); document.getElementById('macro-textarea').value = '';
                    loadData(); // Recarrega os dados fresquinhos do servidor
                } else throw new Error(result.error);
            } catch(e) { showToast('Erro de Rede', e.message, 'error'); } 
            finally { btn.innerHTML = '<i class="ph-bold ph-floppy-disk text-lg"></i> Salvar'; validateForm(); }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(tabId === 'tab-macros') renderTree();
        }

        function renderTree() { document.getElementById('tree-list').innerHTML = '<p class="text-center p-10 text-gray-500">Volte para o modo aglutinador para visualizar as listas completas das planilhas.</p>'; }
        function showToast(title, msg, type) { /* Lógica do Toast padrão */ }

        document.getElementById('search-input').addEventListener('input', (e) => { searchQuery = e.target.value; renderProposals(); });
        document.getElementById('abrangencia-select').addEventListener('change', validateForm);
        document.getElementById('save-btn').addEventListener('click', handleSave);

        loadData();
    </script>
</body>
</html>
